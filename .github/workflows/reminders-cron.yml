name: Reminder cron

on:
  schedule:
    # Every hour at :15 — gentle check-in reminders
    - cron: "15 * * * *"
  workflow_dispatch:

jobs:
  reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Send check-in reminders
        env:
          API_URL: ${{ vars.API_URL || secrets.API_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$API_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "API_URL or CRON_SECRET is not configured — skipping."
            exit 0
          fi
          curl -sf -X POST "$API_URL/api/cron/reminders" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json"
