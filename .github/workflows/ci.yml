name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sagip
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sagip?schema=public
      AUTH_TOKEN_SECRET: ci-test-auth-secret-minimum-thirty-two-chars-long
      APP_ENCRYPTION_KEY: Y2ktYXBwLWVuY3J5cHRpb24ta2V5LTMyLWJ5dGVzISE=
      SKIP_TREASURY: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Production-only Prisma generation
        run: |
          temp_dir="$(mktemp -d)"
          mkdir -p "$temp_dir/client-frontend" "$temp_dir/server-backend/prisma"
          cp package.json package-lock.json "$temp_dir/"
          cp client-frontend/package.json "$temp_dir/client-frontend/"
          cp server-backend/package.json "$temp_dir/server-backend/"
          cp server-backend/prisma/schema.prisma "$temp_dir/server-backend/prisma/"
          cd "$temp_dir"
          npm ci --omit=dev --ignore-scripts
          npm run prisma:generate -w server-backend

      - name: Prisma migrate, deployment sync & seed
        working-directory: server-backend
        run: |
          npx prisma migrate deploy
          npm run db:sync

          node --input-type=module <<'NODE'
          import { PrismaClient } from "@prisma/client";
          const prisma = new PrismaClient();
          const settings = await prisma.setting.findMany({
            where: { key: { in: ["stellar.heldAsset", "rates.coinId", "rates.fiatUrl"] } },
          });
          const values = new Map(settings.map((row) => [row.key, row.value]));
          if (values.get("stellar.heldAsset") !== "XLM") {
            throw new Error("Fresh test deployments must use fundable XLM without a treasury.");
          }
          if (values.get("rates.coinId") !== "stellar") {
            throw new Error("Fresh XLM deployments must use the Stellar market-rate identifier.");
          }
          if (!values.get("rates.fiatUrl")) {
            throw new Error("Database sync did not create rates.fiatUrl.");
          }

          await prisma.setting.update({
            where: { key: "stellar.heldAsset" },
            data: { value: "USDC" },
          });
          await prisma.setting.update({
            where: { key: "rates.coinId" },
            data: { value: "usd-coin" },
          });
          await prisma.setting.update({
            where: { key: "rates.fiatUrl" },
            data: { value: "https://example.test/custom-rates" },
          });
          await prisma.$disconnect();
          NODE

          npm run db:sync

          node --input-type=module <<'NODE'
          import { PrismaClient } from "@prisma/client";
          const prisma = new PrismaClient();
          const heldAsset = await prisma.setting.findUnique({ where: { key: "stellar.heldAsset" } });
          const coinId = await prisma.setting.findUnique({ where: { key: "rates.coinId" } });
          const fiatUrl = await prisma.setting.findUnique({ where: { key: "rates.fiatUrl" } });
          if (heldAsset?.value !== "XLM" || coinId?.value !== "stellar") {
            throw new Error("Database sync did not repair incomplete USDC test funding.");
          }
          if (fiatUrl?.value !== "https://example.test/custom-rates") {
            throw new Error("Database sync overwrote an existing non-funding setting.");
          }
          await prisma.setting.update({
            where: { key: "rates.fiatUrl" },
            data: { value: "https://open.er-api.com/v6/latest/USD" },
          });
          await prisma.$disconnect();
          NODE

          npm run db:seed

      - run: npm run typecheck

      - run: npm run lint

      - run: npm run build

      - name: API, test funding & currency smoke test
        working-directory: server-backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sagip?schema=public
          AUTH_TOKEN_SECRET: ci-test-auth-secret-minimum-thirty-two-chars-long
          APP_ENCRYPTION_KEY: Y2ktYXBwLWVuY3J5cHRpb24ta2V5LTMyLWJ5dGVzISE=
          SKIP_TREASURY: "1"
        run: |
          npx next start -p 8001 &
          server_pid=$!
          trap 'kill $server_pid 2>/dev/null || true' EXIT

          for attempt in {1..20}; do
            if curl -sf http://localhost:8001/api/health | grep -q '"ok":true'; then
              break
            fi
            if [ "$attempt" -eq 20 ]; then
              echo "API did not become ready."
              exit 1
            fi
            sleep 1
          done

          node --input-type=module <<'NODE'
          const base = "http://localhost:8001/api";

          async function request(path, options = {}) {
            const response = await fetch(`${base}${path}`, {
              ...options,
              headers: {
                "content-type": "application/json",
                ...(options.headers ?? {}),
              },
            });
            const text = await response.text();
            const body = text ? JSON.parse(text) : null;
            if (!response.ok) {
              throw new Error(`${path} failed (${response.status}): ${body?.error ?? text}`);
            }
            return body;
          }

          const signup = await request("/auth/sign-up", {
            method: "POST",
            body: JSON.stringify({
              name: "Funding Smoke Test",
              phone: "09170000001",
              pin: "123456",
            }),
          });

          const authHeaders = { authorization: `Bearer ${signup.token}` };
          await request("/wallets", {
            method: "POST",
            headers: authHeaders,
            body: JSON.stringify({ name: "CI test wallet" }),
          });

          const funding = await request("/wallet/add-test-funds", {
            method: "POST",
            headers: authHeaders,
            body: JSON.stringify({ amount: 100 }),
          });
          if (funding.asset !== "XLM" || !funding.txHash || Number(funding.balance) < 100) {
            throw new Error(`Unexpected funding response: ${JSON.stringify(funding)}`);
          }

          const deposit = await request("/wallet/deposit-info", { headers: authHeaders });
          if (!deposit.address || Number(deposit.balance) < 100) {
            throw new Error(`Deposit info did not reflect the top-up: ${JSON.stringify(deposit)}`);
          }

          const rates = await request("/rates");
          if (rates.base !== "XLM" || !(rates.rates?.PHP > 0) || !(rates.rates?.USD > 0)) {
            throw new Error(`Currency rates are incomplete: ${JSON.stringify(rates)}`);
          }
          if (!Array.isArray(rates.sources) || rates.sources.length < 2) {
            throw new Error(`Currency sources are missing: ${JSON.stringify(rates.sources)}`);
          }

          console.log("Funding smoke test passed:", {
            asset: funding.asset,
            balance: funding.balance,
            txHash: funding.txHash,
            phpRate: rates.rates.PHP,
            sources: rates.sources.map((source) => source.name),
          });
          NODE

  e2e:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Stellar testnet e2e
        working-directory: server-backend
        run: npm run e2e